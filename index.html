<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Bag y Accesorios</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
border-bottom:2px solid #d4af37;
}

.logo{
font-size:22px;
font-weight:bold;
color:#d4af37;
}

#buscador{
width:40%;
padding:10px;
border-radius:8px;
border:none;
}

.carrito{
cursor:pointer;
font-size:20px;
color:#d4af37;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:#1a1a1a;
padding:15px;
border-radius:10px;
text-align:center;
}

.producto img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.precio{
color:#d4af37;
font-size:18px;
}

button{
background:#d4af37;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.estrellas{
color:gold;
}

#panel{
background:#000;
padding:20px;
}

#panel input{
margin:5px;
padding:8px;
}

footer{
text-align:center;
padding:20px;
border-top:2px solid #d4af37;
}

a{
color:#d4af37;
text-decoration:none;
}

</style>
</head>

<body>

<header>

<div class="logo">
Shine Bag y Accesorios
</div>

<input id="buscador" placeholder="Buscar carteras..." onkeyup="buscarProducto()">

<div class="carrito" onclick="verCarrito()">
🛒 <span id="contador">0</span>
</div>

</header>


<section class="productos" id="productos">

<div class="producto">
<img src="https://i.imgur.com/2DhmtJ4.jpg">
<h3>Cartera Shine Gold</h3>
<div class="precio">$15000</div>
<div class="estrellas">★★★★★</div>
<button onclick="agregar('Cartera Shine Gold',15000)">Agregar</button>
</div>

<div class="producto">
<img src="https://i.imgur.com/8Km9tLL.jpg">
<h3>Cartera Elegance</h3>
<div class="precio">$18000</div>
<div class="estrellas">★★★★☆</div>
<button onclick="agregar('Cartera Elegance',18000)">Agregar</button>
</div>

<div class="producto">
<img src="https://i.imgur.com/F3QxPpP.jpg">
<h3>Cartera Mini Shine</h3>
<div class="precio">$12000</div>
<div class="estrellas">★★★★★</div>
<button onclick="agregar('Cartera Mini Shine',12000)">Agregar</button>
</div>

<footer>

<p>
Instagram:
<a href="https://instagram.com/shine_everyday.ok" target="_blank">
@shine_everyday.ok
</a>
</p>

<p>© Shine Bag y Accesorios</p>

</footer>


<script>

let carrito=[]
let total=0

function agregar(nombre,precio){

carrito.push({nombre,precio})

total+=precio

document.getElementById("contador").innerText=carrito.length

}

function verCarrito(){

let lista=""

carrito.forEach(p=>{
lista+=p.nombre+" $"+p.precio+"\n"
})

alert(lista+"\nTotal: $"+total)

}

function buscarProducto(){

let input=document.getElementById("buscador").value.toLowerCase()

let productos=document.querySelectorAll(".producto")

productos.forEach(p=>{

let nombre=p.innerText.toLowerCase()

p.style.display=nombre.includes(input)?"block":"none"

})

}

function subirProducto(){

let nombre=document.getElementById("nombre").value
let precio=document.getElementById("precio").value
let imagen=document.getElementById("imagen").value

let contenedor=document.getElementById("productos")

contenedor.innerHTML+=`

<div class="producto">
<img src="${imagen}">
<h3>${nombre}</h3>
<div class="precio">$${precio}</div>
<div class="estrellas">★★★★★</div>
<button onclick="agregar('${nombre}',${precio})">Agregar</button>
</div>

`

}

function pagar(){

window.location.href="https://mpago.la/2kSu3Mp"

}

</script>

</body>
</html>
