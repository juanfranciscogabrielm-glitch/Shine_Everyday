<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Mayorista</title>

<style>

/* VARIABLES */

:root{
--gold:#d4af37;
--dark:#111;
--light:#ffffff;
--gray:#f5f5f5;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:var(--gray);
transition:0.3s;
}

/* MODO OSCURO */

body.dark{
background:#0f0f0f;
color:white;
}

/* HEADER */

header{
background:var(--dark);
color:white;
padding:15px 40px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.logo{
font-size:24px;
color:var(--gold);
font-weight:bold;
}

.search{
flex:1;
max-width:400px;
margin:10px;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
}

/* BOTONES HEADER */

.header-buttons{
display:flex;
gap:10px;
}

.btn{
background:var(--gold);
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* MENU */

.menu{
background:#1c1c1c;
color:white;
display:flex;
gap:25px;
padding:10px 40px;
flex-wrap:wrap;
}

.menu a{
color:white;
text-decoration:none;
font-size:14px;
}

/* BANNER */

.banner{
height:250px;
background:linear-gradient(90deg,#d4af37,#ffcc33);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
}

/* CONTENEDOR */

.container{
max-width:1300px;
margin:auto;
padding:30px;
}

/* PRODUCTOS */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
border:1px solid #ddd;
text-align:center;
}

body.dark .card{
background:#1c1c1c;
border:none;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:var(--gold);
font-size:20px;
font-weight:bold;
margin:10px 0;
}

/* CARRITO */

.cartBox{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
border-left:1px solid #ccc;
padding:20px;
overflow:auto;
display:none;
}

body.dark .cartBox{
background:#1c1c1c;
}

/* PANEL ADMIN */

.admin{
background:white;
padding:20px;
margin:20px;
border-radius:8px;
}

.admin input{
padding:8px;
margin:5px;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">Tienda Gold</div>

<div class="search">
<input placeholder="Buscar productos..." onkeyup="searchProducts()">
</div>

<div class="header-buttons">

<button class="btn" onclick="toggleCart()">🛒</button>

<button class="btn" onclick="toggleDark()">🌙</button>

<a href="https://instagram.com" target="_blank">
<button class="btn">Instagram</button>
</a>

</div>

</header>

<div class="menu">

<a href="#">Inicio</a>
<a href="#">Ofertas</a>
<a href="#">Tecnología</a>
<a href="#">Ropa</a>
<a href="#">Hogar</a>
<a href="#">Contacto</a>

</div>

<div class="banner">
OFERTAS MAYORISTAS
</div>

<div class="container">

<div class="products" id="products"></div>

</div>

<!-- PANEL ADMIN -->

<div class="admin">

<h3>Panel administrador</h3>

<input id="name" placeholder="Nombre producto">
<input id="price" placeholder="Precio">
<input id="image" placeholder="URL imagen">

<button class="btn" onclick="addProduct()">Agregar producto</button>

</div>

<!-- CARRITO -->

<div class="cartBox" id="cartBox">

<h3>Carrito</h3>

<div id="cartItems"></div>

<h3>Total: $<span id="total">0</span></h3>

<a href="https://mpago.la/2kSu3Mp">

<button class="btn">
Pagar con Mercado Pago
</button>

</a>

</div>

<footer>

Síguenos en Instagram

</footer>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

function renderProducts(){

let container=document.getElementById("products");
container.innerHTML="";

products.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div>⭐⭐⭐⭐⭐</div>

<div class="price">$${p.price}</div>

<button class="btn" onclick="addCart(${i})">
Agregar al carrito
</button>

</div>

`;

});

}

function addProduct(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let image=document.getElementById("image").value;

products.push({name,price,image});

save();
renderProducts();

}

function addCart(i){

cart.push(products[i]);

save();
renderCart();

}

function renderCart(){

let items=document.getElementById("cartItems");
let total=0;

items.innerHTML="";

cart.forEach(p=>{

items.innerHTML+=`<p>${p.name} - $${p.price}</p>`;
total+=Number(p.price);

});

document.getElementById("total").innerText=total;

}

function toggleCart(){

let cart=document.getElementById("cartBox");

cart.style.display=cart.style.display=="block"?"none":"block";

renderCart();

}

function searchProducts(){

let input=document.querySelector(".search input").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let name=card.querySelector("h3").innerText.toLowerCase();

card.style.display=name.includes(input)?"block":"none";

});

}

function toggleDark(){

document.body.classList.toggle("dark");

}

renderProducts();
renderCart();

</script>

</body>
</html>
