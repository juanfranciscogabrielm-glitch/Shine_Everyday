<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shine-Everyday</title>

<style>

body{
background:#0f0f14;
font-family:Arial;
margin:0;
color:#b67aff;
font-style:italic;
}

header{
background:#000;
padding:25px;
text-align:center;
}

h1{
margin:0;
font-size:35px;
}

nav{
background:#15151d;
padding:15px;
text-align:center;
}

nav a{
color:#b67aff;
text-decoration:none;
margin:0 15px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
gap:20px;
}

.producto{
background:#1b1b25;
width:260px;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.6);
transition:0.3s;
}

.producto:hover{
transform:scale(1.05);
}

.producto img{
width:100%;
border-radius:10px;
}

.miniaturas{
display:flex;
gap:6px;
margin-top:8px;
justify-content:center;
}

.miniaturas img{
width:55px;
cursor:pointer;
}

.precio{
font-size:22px;
margin:10px 0;
}

button{
background:#b67aff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#9c5cff;
}

.carrito{
position:fixed;
top:20px;
right:20px;
background:#1b1b25;
padding:15px;
border-radius:10px;
width:220px;
}

.estrellas{
color:gold;
cursor:pointer;
font-size:20px;
}

footer{
background:#000;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>

<h1>Shine-Everyday</h1>

<p>✨ Elegancia que brilla todos los días</p>

<p>Instagram: @shine.everyday</p>

</header>

<nav>

<a href="#">Inicio</a>

</nav>

<div class="carrito">

<h3>🛒 Carrito</h3>

<ul id="lista-carrito"></ul>

<p>Total: $<span id="total">0</span></p>

</div>

<section class="container">

<div class="producto">

<img id="img1" src="IMG_9986.jpeg">

<div class="miniaturas">

<img src="IMG_9986.jpeg" onclick="cambiarImagen('img1','IMG_9986.jpeg')">
<img src="IMG_9990.jpeg" onclick="cambiarImagen('img1','IMG_9990.jpeg')">
<img src="IMG_9991.jpeg" onclick="cambiarImagen('img1','IMG_9991.jpeg')">

</div>

<h3>Aura Noir</h3>

<p class="precio">$38000</p>

<button onclick="agregarCarrito('Aura Noir',38000)">Agregar al carrito</button>

<div class="estrellas" onclick="calificar(this)">★★★★★</div>

</div>

</section>

<section style="text-align:center;margin-top:40px">

<h2>Contacto</h2>

<a href="https://wa.me/54935117510656">

<button>Contactar por WhatsApp</button>

</a>

</section>

<footer>

<p>© Shine-Everyday</p>

</footer>

<script>

function cambiarImagen(id,src){

document.getElementById(id).src=src

}

let total=0

function agregarCarrito(nombre,precio){

let lista=document.getElementById("lista-carrito")

let item=document.createElement("li")

item.textContent=nombre+" - $"+precio

lista.appendChild(item)

total+=precio

document.getElementById("total").textContent=total

}

function calificar(el){

alert("¡Gracias por tu reseña!")

}

</script>

</body>
</html>
