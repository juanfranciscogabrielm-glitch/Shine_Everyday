<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Bag y Accesorios</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
border-bottom:2px solid #d4af37;
}

.logo{
font-size:22px;
color:#d4af37;
font-weight:bold;
}

#buscador{
width:40%;
padding:10px;
border-radius:8px;
border:none;
}

.carrito{
cursor:pointer;
font-size:20px;
color:#d4af37;
}

.banner{
text-align:center;
padding:40px;
background:#111;
border-bottom:2px solid #d4af37;
}

.banner h1{
color:#d4af37;
font-size:38px;
}

.filtros{
padding:10px;
text-align:center;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:#1a1a1a;
padding:15px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.producto:hover{
transform:scale(1.05);
}

.producto img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.precio{
color:#d4af37;
font-size:18px;
}

.estrellas{
color:gold;
}

button{
background:#d4af37;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin:5px;
}

footer{
text-align:center;
padding:20px;
border-top:2px solid #d4af37;
}

a{
color:#d4af37;
text-decoration:none;
}

#carritoPanel{
position:fixed;
right:-320px;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
border-left:2px solid #d4af37;
overflow:auto;
}

#carritoPanel.abierto{
right:0;
}

</style>
</head>

<body>

<header>

<div class="logo">
Shine Bag y Accesorios
</div>

<input id="buscador" placeholder="Buscar carteras..." onkeyup="buscarProducto()">

<div class="carrito" onclick="verCarrito()">
🛒 <span id="contador">0</span>
</div>

</header>

<section class="banner">
<h1>Shine Bag</h1>
<p>Carteras y accesorios elegantes</p>
</section>

<div class="filtros">

<button onclick="filtrarPrecio(15000)">Hasta $15000</button>
<button onclick="filtrarPrecio(20000)">Hasta $20000</button>
<button onclick="mostrarTodo()">Todo</button>

</div>

<section class="productos" id="productos">

<div class="producto" data-precio="15000">
<img src="https://i.imgur.com/2DhmtJ4.jpg">
<h3>Cartera Shine Gold</h3>
<div class="precio">$15000</div>
<div class="estrellas">★★★★★</div>

<button onclick="agregar('Cartera Shine Gold',15000)">Agregar</button>
<button onclick="favorito('Cartera Shine Gold')">❤️</button>

</div>

<div class="producto" data-precio="18000">
<img src="https://i.imgur.com/8Km9tLL.jpg">
<h3>Cartera Elegance</h3>
<div class="precio">$18000</div>
<div class="estrellas">★★★★☆</div>

<button onclick="agregar('Cartera Elegance',18000)">Agregar</button>
<button onclick="favorito('Cartera Elegance')">❤️</button>

</div>

<div class="producto" data-precio="12000">
<img src="https://i.imgur.com/F3QxPpP.jpg">
<h3>Cartera Mini Shine</h3>
<div class="precio">$12000</div>
<div class="estrellas">★★★★★</div>

<button onclick="agregar('Cartera Mini Shine',12000)">Agregar</button>
<button onclick="favorito('Cartera Mini Shine')">❤️</button>

</div>

</section>


<div id="carritoPanel">

<h2>Carrito</h2>

<div id="listaCarrito"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="pagar()">Pagar</button>

</div>

<footer>

<p>
Instagram:
<a href="https://instagram.com/shine_everyday.ok" target="_blank">
@shine_everyday.ok
</a>
</p>

<p>© Shine Bag y Accesorios</p>

</footer>

<script>

let carrito=[]
let total=0

function agregar(nombre,precio){

carrito.push({nombre,precio})

total+=precio

document.getElementById("contador").innerText=carrito.length

}

function verCarrito(){

let panel=document.getElementById("carritoPanel")

panel.classList.toggle("abierto")

let lista=""

carrito.forEach(p=>{
lista+=`<p>${p.nombre} $${p.precio}</p>`
})

document.getElementById("listaCarrito").innerHTML=lista
document.getElementById("total").innerText=total

}

function buscarProducto(){

let input=document.getElementById("buscador").value.toLowerCase()

let productos=document.querySelectorAll(".producto")

productos.forEach(p=>{

let nombre=p.innerText.toLowerCase()

p.style.display=nombre.includes(input)?"block":"none"

})

}

function filtrarPrecio(max){

let productos=document.querySelectorAll(".producto")

productos.forEach(p=>{

let precio=p.getAttribute("data-precio")

p.style.display=precio<=max?"block":"none"

})

}

function mostrarTodo(){

let productos=document.querySelectorAll(".producto")

productos.forEach(p=>{
p.style.display="block"
})

}

function favorito(nombre){

alert("Agregado a favoritos: "+nombre)

}

function pagar(){

window.location.href="https://mpago.la/2kSu3Mp"

}

</script>

</body>
</html>
