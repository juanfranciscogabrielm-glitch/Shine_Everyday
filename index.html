<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:#eaeaea;
}

/* BARRA SUPERIOR */

.navbar{
background:#131921;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ff9900;
}

.search{
width:300px;
padding:8px;
border-radius:4px;
border:none;
}

/* CONTENEDOR */

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

/* GRID PRODUCTOS */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

/* TARJETA */

.product{
background:white;
padding:15px;
border-radius:6px;
border:1px solid #ddd;
transition:0.2s;
}

.product:hover{
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* IMAGEN */

.product img{
width:100%;
height:160px;
object-fit:contain;
}

/* TITULO */

.product h3{
font-size:16px;
margin:10px 0;
}

/* ESTRELLAS */

.stars{
color:#f5a623;
font-size:14px;
}

/* PRECIO */

.price{
font-size:20px;
font-weight:bold;
color:#b12704;
margin:10px 0;
}

/* BOTON */

.buy{
background:#ffd814;
border:1px solid #fcd200;
padding:8px;
width:100%;
border-radius:20px;
cursor:pointer;
}

.buy:hover{
background:#f7ca00;
}

/* RESPONSIVE */

@media(max-width:600px){

.search{
width:100%;
margin-top:10px;
}

.navbar{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">MiTienda</div>

<input class="search" placeholder="Buscar productos">

</div>

<div class="container">

<div class="products">

<div class="product">

<img src="https://picsum.photos/300/200">

<h3>Valencia</h3>

<div class="stars">★★★★★</div>

<div class="price">$40.000</div>

<button class="buy">Agregar al carrito</button>

</div>

<div class="product">

<img src="https://picsum.photos/300/201">

<h3>Producto 2</h3>

<div class="stars">★★★★☆</div>

<div class="price">$25.000</div>

<button class="buy">Agregar al carrito</button>

</div>

</div>

</div>

</body>
</html>
