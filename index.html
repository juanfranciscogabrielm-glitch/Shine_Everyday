<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Mayorista</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */

.header{
background:#111;
color:white;
padding:15px 40px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff6600;
}

.search{
flex:1;
max-width:400px;
margin:10px;
}

.search input{
width:100%;
padding:10px;
border-radius:5px;
border:none;
}

/* MENU */

.menu{
background:#222;
color:white;
display:flex;
gap:25px;
padding:10px 40px;
font-size:14px;
}

.menu a{
color:white;
text-decoration:none;
}

/* BANNER */

.banner{
height:250px;
background:linear-gradient(90deg,#ff6600,#ff9900);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:32px;
font-weight:bold;
}

/* CONTENEDOR */

.container{
max-width:1300px;
margin:auto;
padding:30px;
}

/* GRID PRODUCTOS */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

/* TARJETA PRODUCTO */

.product{
background:white;
padding:15px;
border-radius:8px;
border:1px solid #ddd;
transition:0.2s;
}

.product:hover{
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transform:translateY(-3px);
}

.product img{
width:100%;
height:180px;
object-fit:contain;
margin-bottom:10px;
}

.product h3{
font-size:15px;
margin-bottom:5px;
}

.price{
color:#e60023;
font-weight:bold;
font-size:20px;
margin:10px 0;
}

.buy{
background:#ff6600;
border:none;
padding:10px;
width:100%;
border-radius:6px;
color:white;
cursor:pointer;
font-weight:bold;
}

.buy:hover{
background:#e55a00;
}

/* FOOTER */

.footer{
background:#111;
color:white;
padding:30px;
text-align:center;
margin-top:40px;
}

/* RESPONSIVE */

@media(max-width:700px){

.header{
flex-direction:column;
align-items:flex-start;
}

.menu{
flex-wrap:wrap;
gap:15px;
}

.banner{
font-size:22px;
text-align:center;
padding:20px;
}

}

</style>
</head>

<body>

<div class="header">

<div class="logo">Mi Mayorista</div>

<div class="search">
<input placeholder="Buscar productos...">
</div>

</div>

<div class="menu">

<a href="#">Inicio</a>
<a href="#">Ofertas</a>
<a href="#">Ropa</a>
<a href="#">Tecnología</a>
<a href="#">Hogar</a>
<a href="#">Contacto</a>

</div>

<div class="banner">
OFERTAS MAYORISTAS
</div>

<div class="container">

<div class="products">

<div class="product">

<img src="https://picsum.photos/300/200">

<h3>Valencia</h3>

<div class="price">$40.000</div>

<button class="buy">Agregar al carrito</button>

</div>

<div class="product">

<img src="https://picsum.photos/300/201">

<h3>Producto 2</h3>

<div class="price">$25.000</div>

<button class="buy">Agregar al carrito</button>

</div>

<div class="product">

<img src="https://picsum.photos/300/202">

<h3>Producto 3</h3>

<div class="price">$19.000</div>

<button class="buy">Agregar al carrito</button>

</div>

</div>

</div>

<div class="footer">

© 2026 Mi Mayorista

</div>

</body>
</html>
