```html
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Everyday</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eaeded;
}

/* HEADER */

header{
background:#131921;
color:white;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:22px;
font-weight:bold;
color:#ff9900;
}

.search input{
padding:8px;
border:none;
border-radius:4px;
}

/* PRODUCTOS */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.producto{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.producto img{
width:100%;
border-radius:6px;
}

.precio{
color:#b12704;
font-weight:bold;
}

/* BOTON */

button{
background:#ffd814;
border:1px solid #fcd200;
padding:8px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

/* ESTRELLAS */

.estrellas span{
font-size:20px;
cursor:pointer;
color:gray;
}

.estrellas span:hover,
.estrellas span.activa{
color:gold;
}

/* RESEÑAS */

.reseñas{
font-size:13px;
margin-top:10px;
border-top:1px solid #ddd;
padding-top:5px;
}

.reseña{
margin-bottom:5px;
}

</style>

</head>

<body>

<header>
<div class="logo">Shine Everyday</div>
<div class="search">
<input type="text" placeholder="Buscar productos...">
</div>
</header>

<section class="container">

<div class="producto">

<img src="https://via.placeholder.com/200">

<h3>Valencia</h3>

<p class="precio">$40.000</p>

<button>Comprar</button>

<div class="estrellas">
<span onclick="calificar(this)">★</span>
<span onclick="calificar(this)">★</span>
<span onclick="calificar(this)">★</span>
<span onclick="calificar(this)">★</span>
<span onclick="calificar(this)">★</span>
</div>

<input type="text" placeholder="Escribir reseña..." class="texto">

<button onclick="agregarReseña(this)">Enviar reseña</button>

<div class="reseñas"></div>

</div>

</section>

<script>

function calificar(estrella){

let estrellas = estrella.parentElement.children

for(let i=0;i<estrellas.length;i++){
estrellas[i].classList.remove("activa")
}

estrella.classList.add("activa")

let prev = estrella.previousElementSibling

while(prev){
prev.classList.add("activa")
prev = prev.previousElementSibling
}

}

function agregarReseña(boton){

let producto = boton.parentElement

let texto = producto.querySelector(".texto").value

let estrellas = producto.querySelectorAll(".activa").length

let contenedor = producto.querySelector(".reseñas")

if(texto === "") return

let reseña = document.createElement("div")

reseña.className="reseña"

reseña.innerHTML = "⭐".repeat(estrellas) + " - " + texto

contenedor.appendChild(reseña)

producto.querySelector(".texto").value=""

}

</script>

</body>

</html>
