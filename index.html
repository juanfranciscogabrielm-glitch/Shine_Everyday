<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tienda Pro</title>

<style>

:root{
--gold:#d4af37;
--dark:#0f0f0f;
--light:#ffffff;
}

/* GENERAL */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
transition:0.3s;
}

/* MODO OSCURO */

body.dark{
background:#0f0f0f;
color:white;
}

body.dark .card{
background:#1c1c1c;
border:none;
}

/* HEADER */

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logo{
color:var(--gold);
font-size:24px;
font-weight:bold;
}

.search{
padding:8px;
border-radius:5px;
border:none;
width:220px;
}

/* BOTONES HEADER */

.header-buttons{
display:flex;
gap:10px;
align-items:center;
}

.btn{
background:var(--gold);
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
opacity:0.9;
}

/* PRODUCTOS */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
border:1px solid #ddd;
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:contain;
}

.price{
color:var(--gold);
font-size:20px;
font-weight:bold;
}

/* ADMIN */

.admin{
background:white;
padding:20px;
margin:20px;
border-radius:8px;
}

.admin input{
padding:8px;
margin:5px;
}

/* CARRITO */

.cartBox{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
border-left:1px solid #ccc;
padding:20px;
overflow:auto;
}

body.dark .cartBox{
background:#1c1c1c;
}

</style>
</head>

<body>

<header>

<div class="logo">Tienda Gold</div>

<input class="search" placeholder="Buscar..." onkeyup="searchProducts()">

<div class="header-buttons">

<button class="btn" onclick="toggleCart()">🛒</button>

<button class="btn" onclick="toggleDark()">🌙</button>

<a href="https://instagram.com" target="_blank">
<button class="btn">Instagram</button>
</a>

</div>

</header>

<div class="container">

<div class="products" id="products"></div>

</div>

<!-- PANEL ADMIN -->

<div class="admin">

<h3>Panel administrador</h3>

<input id="name" placeholder="Nombre producto">
<input id="price" placeholder="Precio">
<input id="image" placeholder="URL imagen">

<button class="btn" onclick="addProduct()">Agregar</button>

</div>

<!-- CARRITO -->

<div class="cartBox" id="cartBox" style="display:none">

<h3>Carrito</h3>

<div id="cartItems"></div>

<h3>Total: $<span id="total">0</span></h3>

<a href="https://mpago.la/2kSu3Mp">

<button class="btn">
Pagar con Mercado Pago
</button>

</a>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

function renderProducts(){

let container = document.getElementById("products");

container.innerHTML="";

products.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="price">$${p.price}</div>

<div>⭐⭐⭐⭐⭐</div>

<button class="btn" onclick="addCart(${i})">
Agregar al carrito
</button>

</div>

`;

});

}

function addProduct(){

let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let image=document.getElementById("image").value;

products.push({name,price,image});

save();
renderProducts();

}

function addCart(i){

cart.push(products[i]);

save();
renderCart();

}

function renderCart(){

let items=document.getElementById("cartItems");

let total=0;

items.innerHTML="";

cart.forEach(p=>{

items.innerHTML+=`<p>${p.name} - $${p.price}</p>`;

total+=Number(p.price);

});

document.getElementById("total").innerText=total;

}

function toggleCart(){

let cart=document.getElementById("cartBox");

cart.style.display=cart.style.display=="none"?"block":"none";

renderCart();

}

function searchProducts(){

let input=document.querySelector(".search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let name=card.querySelector("h3").innerText.toLowerCase();

card.style.display=name.includes(input)?"block":"none";

});

}

function toggleDark(){

document.body.classList.toggle("dark");

}

renderProducts();
renderCart();

</script>

</body>
</html>
