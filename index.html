<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;
font-style:italic;
color:purple;
transition:0.3s;
}

.dark{
background:#121212;
color:#bb86fc;
}

header{
background:#232f3e;
color:white;
padding:20px;
text-align:center;
}

button{
background:#ff9900;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e68a00;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.producto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.dark .producto{
background:#1e1e1e;
}

.carrito{
position:fixed;
top:20px;
right:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
width:200px;
}

.dark .carrito{
background:#1e1e1e;
}

.estrellas span{
font-size:20px;
cursor:pointer;
color:gray;
}

.estrellas span.activa{
color:gold;
}

</style>
</head>

<body>

<header>
<h1>Mi Tienda</h1>

<button onclick="modoOscuro()">🌙 Modo oscuro</button>

</header>

<div class="productos">

<div class="producto">

<h3>Producto 1</h3>
<p>$10</p>

<button onclick="agregar('Producto 1',10)">
Agregar al carrito
</button>

<div class="estrellas" onclick="calificar(this,event)">
<span>★</span>
<span>★</span>
<span>★</span>
<span>★</span>
<span>★</span>
</div>

<p class="reseña"></p>

</div>

<div class="producto">

<h3>Producto 2</h3>
<p>$15</p>

<button onclick="agregar('Producto 2',15)">
Agregar al carrito
</button>

<div class="estrellas" onclick="calificar(this,event)">
<span>★</span>
<span>★</span>
<span>★</span>
<span>★</span>
<span>★</span>
</div>

<p class="reseña"></p>

</div>

</div>

<div class="carrito">

<h3>Carrito</h3>

<ul id="lista"></ul>

<p>Total: $<span id="total">0</span></p>

</div>

<script>

let total=0

function agregar(nombre,precio){

let lista=document.getElementById("lista")

let item=document.createElement("li")

item.textContent=nombre+" - $"+precio

lista.appendChild(item)

total+=precio

document.getElementById("total").textContent=total

}

function calificar(contenedor,event){

if(event.target.tagName!="SPAN")return

let estrellas=contenedor.querySelectorAll("span")

estrellas.forEach(e=>e.classList.remove("activa"))

let index=[...estrellas].indexOf(event.target)

for(let i=0;i<=index;i++){
estrellas[i].classList.add("activa")
}

contenedor.nextElementSibling.textContent=
"Calificación: "+(index+1)+" estrellas"

}

function modoOscuro(){

document.body.classList.toggle("dark")

}

</script>

</body>
</html>
