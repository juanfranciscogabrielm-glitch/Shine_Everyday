<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shine-Everyday</title>

<style>

body{
background:#121212;
color:purple;
font-style:italic;
font-family:Arial;
margin:0;
}

header{
background:#000;
padding:20px;
text-align:center;
}

h1{
color:purple;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
padding:20px;
}

.producto{
background:#1e1e1e;
width:300px;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px black;
text-align:center;
}

.producto img{
width:100%;
border-radius:10px;
}

.miniaturas{
display:flex;
gap:5px;
margin-top:5px;
justify-content:center;
}

.miniaturas img{
width:60px;
cursor:pointer;
}

.precio{
font-size:22px;
font-weight:bold;
}

button{
background:purple;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#6a0dad;
}

#carrito{
position:fixed;
top:10px;
right:10px;
background:#1e1e1e;
padding:15px;
border-radius:10px;
width:200px;
}

.estrellas span{
font-size:20px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>Shine-Everyday</h1>
<p>Elegancia que brilla todos los días</p>
</header>

<div id="carrito">
<h3>Carrito</h3>
<div id="lista"></div>
<p>Total: $<span id="total">0</span></p>

<button onclick="pagar()">Pagar</button>
</div>

<section class="container">

<div class="producto">

<img id="img1" src="IMG_9986.jpeg">

<div class="miniaturas">
<img src="IMG_9986.jpeg" onclick="cambiar('img1','IMG_9986.jpeg')">
<img src="IMG_9990.jpeg" onclick="cambiar('img1','IMG_9990.jpeg')">
<img src="IMG_9991.jpeg" onclick="cambiar('img1','IMG_9991.jpeg')">
</div>

<h3>Aura Noir</h3>

<p class="precio">$38000</p>

<button onclick="agregar('Aura Noir',38000)">
Agregar al carrito
</button>

<div class="estrellas">
<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>
</div>

</div>

</section>

<script>

let carrito=[]
let total=0

function cambiar(id,img){
document.getElementById(id).src=img
}

function agregar(nombre,precio){

carrito.push({nombre,precio})

total+=precio

document.getElementById("total").innerText=total

let item=document.createElement("div")
item.innerText=nombre+" $"+precio

document.getElementById("lista").appendChild(item)

}

function pagar(){

alert("Total a pagar: $"+total)

window.open("https://mpago.la./2kSu3Mp")

}

function rate(n){

alert("Gracias por tu reseña de "+n+" estrellas")

}

</script>

</body>
</html>
