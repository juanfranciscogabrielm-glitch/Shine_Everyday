<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shine Everyday</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
}

/* NAVBAR */

.navbar{
background:#0f1a24;
color:white;
padding:12px 20px;
display:flex;
align-items:center;
justify-content:space-between;
flex-wrap:wrap;
}

.logo{
color:orange;
font-size:20px;
font-weight:bold;
}

.search{
padding:7px;
border-radius:5px;
border:none;
width:180px;
}

/* CONTENEDOR */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

/* TARJETA */

.card{
background:white;
border-radius:8px;
padding:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

/* IMAGEN PEQUEÑA */

.card img{
width:100%;
max-height:120px;
object-fit:cover;
border-radius:6px;
margin-bottom:10px;
}

/* TITULO */

.card h3{
font-size:18px;
margin-bottom:5px;
}

/* PRECIO */

.price{
color:#e63900;
font-weight:bold;
margin-bottom:8px;
}

/* BOTON */

.buy{
background:#ffc107;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
font-weight:bold;
}

.buy:hover{
background:#ffb300;
}

/* ESTRELLAS */

.stars{
color:gold;
margin-bottom:8px;
}

/* RESEÑA */

.review-box{
display:flex;
gap:5px;
}

.review-box input{
flex:1;
padding:5px;
font-size:12px;
}

.review-box button{
padding:5px 8px;
background:#ffc107;
border:none;
border-radius:4px;
cursor:pointer;
}

.reviews{
margin-top:8px;
font-size:12px;
text-align:left;
}

/* RESPONSIVE */

@media (max-width:600px){

.logo{
font-size:18px;
}

.search{
width:100%;
margin-top:10px;
}

.navbar{
flex-direction:column;
align-items:flex-start;
}

}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">Shine Everyday</div>

<input class="search" placeholder="Buscar productos...">

</div>

<div class="container">

<div class="products">

<div class="card">

<img src="https://picsum.photos/300/200">

<h3>Valencia</h3>

<div class="price">$40.000</div>

<button class="buy">Comprar</button>

<div class="stars">★★★★★</div>

<div class="review-box">
<input id="reviewInput" placeholder="Reseña...">
<button onclick="addReview()">Enviar</button>
</div>

<div class="reviews" id="reviews"></div>

</div>

</div>

</div>

<script>

function addReview(){

let input = document.getElementById("reviewInput");
let reviews = document.getElementById("reviews");

if(input.value.trim() !== ""){

let p = document.createElement("p");
p.textContent = "• " + input.value;

reviews.appendChild(p);

input.value="";

}

}

</script>

</body>
</html>
